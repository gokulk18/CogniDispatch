worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Azure App Service DNS resolver — required for dynamic proxy_pass variables.
    # Using variables defers upstream DNS resolution to request time (not startup),
    # so nginx starts successfully even when microservices aren't on the same network.
    resolver 168.63.129.16 valid=10s ipv6=off;

    server {
        listen 5000;
        server_name localhost;

        location /api/auth/ {
            set $upstream http://auth-service:5001;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/vendors/ {
            set $upstream http://vendor-service:5002;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ai/ {
            set $upstream http://ai-service:5003;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/admin/ {
            set $upstream http://admin-service:5004;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/dispatches/ {
            set $upstream http://dispatch-service:5005;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/payments/ {
            set $upstream http://payment-service:5006;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /socket.io/ {
            set $upstream http://dispatch-service:5005;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/health {
            default_type application/json;
            return 200 '{"status":"online","service":"api-gateway-nginx"}';
        }
    }
}
