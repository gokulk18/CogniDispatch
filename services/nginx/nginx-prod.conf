worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstreams for Docker Compose
    upstream auth_backend {
        server auth-service:5001;
    }
    upstream vendor_backend {
        server vendor-service:5002;
    }
    upstream ai_backend {
        server ai-service:5003;
    }
    upstream admin_backend {
        server admin-service:5004;
    }
    upstream dispatch_backend {
        server dispatch-service:5005;
    }
    upstream payment_backend {
        server payment-service:5006;
    }

    server {
        listen 80;
        server_name localhost;

        location /api/auth/ {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/vendors/ {
            proxy_pass http://vendor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ai/ {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/admin/ {
            proxy_pass http://admin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/dispatches/ {
            proxy_pass http://dispatch_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/payments/ {
            proxy_pass http://payment_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /socket.io/ {
            proxy_pass http://dispatch_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
        
        location /api/health {
            default_type application/json;
            return 200 '{"status":"online", "service":"api-gateway-nginx-prod"}';
        }
    }
}
