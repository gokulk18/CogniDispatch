worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Upstreams for local VM / manual deployment
    upstream auth_backend {
        server 127.0.0.1:5001;
    }
    upstream vendor_backend {
        server 127.0.0.1:5002;
    }
    upstream ai_backend {
        server 127.0.0.1:5003;
    }
    upstream admin_backend {
        server 127.0.0.1:5004;
    }
    upstream dispatch_backend {
        server 127.0.0.1:5005;
    }
    upstream payment_backend {
        server 127.0.0.1:5006;
    }

    server {
        listen 5000;
        server_name localhost;

        # Auth Service
        location /api/auth/ {
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vendor Service
        location /api/vendors/ {
            proxy_pass http://vendor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Service
        location /api/ai/ {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Admin Service
        location /api/admin/ {
            proxy_pass http://admin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Dispatch Service (REST)
        location /api/dispatches/ {
            proxy_pass http://dispatch_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Payment Service
        location /api/payments/ {
            proxy_pass http://payment_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Dispatch Service (WebSockets)
        location /socket.io/ {
            proxy_pass http://dispatch_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
        
        # Health Check
        location /api/health {
            default_type application/json;
            return 200 '{"status":"online", "service":"api-gateway-nginx"}';
        }
    }
}
