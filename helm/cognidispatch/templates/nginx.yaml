{{- if .Values.nginx.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cogni-backend
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: cogni-backend
    tier: backend
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      app: cogni-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cogni-backend
        tier: backend
    spec:
      containers:
        - name: cogni-nginx
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.nginx.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cogni-backend-svc
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: cogni-backend
    tier: backend
spec:
  type: NodePort
  selector:
    app: cogni-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
{{- end -}}
