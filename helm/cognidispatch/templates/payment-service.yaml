{{- if .Values.paymentService.enabled -}}
{{- if .Values.keyvault.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service-sa
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.keyvault.clientId | quote }}
---
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: payment-service
    tier: backend
    {{- if and .Values.keyvault.enabled .Values.keyvault.workloadIdentityEnabled }}
    azure.workload.identity/use: "true"
    {{- end }}
spec:
  replicas: {{ .Values.paymentService.replicas }}
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-service
        tier: backend
        {{- if and .Values.keyvault.enabled .Values.keyvault.workloadIdentityEnabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.keyvault.enabled }}
      serviceAccountName: payment-service-sa
      {{- end }}
      containers:
        - name: payment-service
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.paymentService.image }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          workingDir: /app/payment-service
          ports:
            - containerPort: 5006
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "5006"
            {{- if .Values.keyvault.enabled }}
            - name: MONGODB_URI_FILE
              value: "/mnt/secrets/MONGODB-URI"
            {{- end }}
          envFrom:
            - configMapRef:
                name: cogni-config
          resources:
            {{- toYaml .Values.paymentService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/payments/health
              port: 5006
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/payments/health
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- if .Values.keyvault.enabled }}
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets"
              readOnly: true
          {{- end }}
      {{- if .Values.keyvault.enabled }}
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "cogni-secrets-provider"
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: payment-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - name: http
      port: 5006
      targetPort: 5006
      protocol: TCP
{{- end -}}
