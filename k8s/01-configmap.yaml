apiVersion: v1
kind: ConfigMap
metadata:
  name: cogni-config
  namespace: cogni-dispatch
  labels:
    app: cogni-dispatch
data:
  MONGODB_URI: "mongodb://cosmos-cognidispatch-db:<password>@cosmos-cognidispatch-db.mongo.cosmos.azure.com:10255/cognidispatch?ssl=true&replicaSet=globaldb&retrywrites=false&maxIdleTimeMS=120000&appName=@cosmos-cognidispatch-db@"

  # Azure Speech Service — Central India
  AZURE_SPEECH_KEY: "REPLACE_WITH_YOUR_REGENERATED_KEY"
  AZURE_SPEECH_REGION: "centralindia"

  # Azure OpenAI (set real values when you provision Azure OpenAI)
  AZURE_OPENAI_ENDPOINT: "https://mock-openai.openai.azure.com/"
  AZURE_OPENAI_KEY: "mock_openai_key"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o"

  # CORS allowed origin — replace with your Application Gateway public IP or hostname
  ALLOWED_CLIENT_IP: "http://REPLACE_WITH_APPGW_PUBLIC_IP"

  NODE_ENV: "production"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cogni-nginx-config
  namespace: cogni-dispatch
  labels:
    app: cogni-dispatch
data:
  nginx.conf: |
    worker_processes 1;

    events {
        worker_connections 1024;
    }

    http {
        include       mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        keepalive_timeout  65;

        upstream auth_backend {
            server auth-service:5001;
        }
        upstream vendor_backend {
            server vendor-service:5002;
        }
        upstream ai_backend {
            server ai-service:5003;
        }
        upstream admin_backend {
            server admin-service:5004;
        }
        upstream dispatch_backend {
            server dispatch-service:5005;
        }
        upstream payment_backend {
            server payment-service:5006;
        }

        server {
            listen 5000;
            server_name localhost;

            location /api/auth/ {
                proxy_pass http://auth_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /api/vendors/ {
                proxy_pass http://vendor_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /api/ai/ {
                proxy_pass http://ai_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_connect_timeout 120s;
                proxy_read_timeout 120s;
            }

            location /api/admin/ {
                proxy_pass http://admin_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /api/dispatches/ {
                proxy_pass http://dispatch_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_connect_timeout 300s;
                proxy_read_timeout 300s;
            }

            location /api/payments/ {
                proxy_pass http://payment_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_connect_timeout 60s;
                proxy_read_timeout 60s;
            }

            location /socket.io/ {
                proxy_pass http://dispatch_backend;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_cache_bypass $http_upgrade;
            }

            location /api/health {
                default_type application/json;
                return 200 '{"status":"online", "service":"api-gateway-nginx-k8s"}';
            }
        }
    }
