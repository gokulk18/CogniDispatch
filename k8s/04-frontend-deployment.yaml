apiVersion: apps/v1
kind: Deployment
metadata:
  name: cogni-frontend
  namespace: cogni-dispatch
  labels:
    app: cogni-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cogni-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cogni-frontend
        tier: frontend
    spec:
      containers:
        - name: cogni-frontend
          # Replace acrcognidispatch with your ACR name
          # IMPORTANT: This image must be built with --build-arg NEXT_PUBLIC_SERVER_IP=http://<APPGW_PUBLIC_IP>
          image: acrcognidispatch.azurecr.io/cogni-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
