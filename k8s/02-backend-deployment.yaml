apiVersion: apps/v1
kind: Deployment
metadata:
  name: cogni-backend
  namespace: cogni-dispatch
  labels:
    app: cogni-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cogni-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cogni-backend
        tier: backend
    spec:
      containers:
        - name: cogni-nginx
          image: acrcogniutrawi.azurecr.io/cogni-nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: nginx-config-volume
          configMap:
            name: cogni-nginx-config

---

