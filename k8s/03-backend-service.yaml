apiVersion: v1
kind: Service
metadata:
  name: cogni-backend-svc
  namespace: cogni-dispatch
  labels:
    app: cogni-backend
    tier: backend
spec:
  type: LoadBalancer
  selector:
    app: cogni-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP

---

