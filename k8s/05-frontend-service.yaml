apiVersion: v1
kind: Service
metadata:
  name: cogni-frontend-svc
  namespace: cogni-dispatch
  labels:
    app: cogni-frontend
    tier: frontend
spec:
  type: NodePort
  selector:
    app: cogni-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      # NodePort 30080 — App Gateway default backend pool points to AKS_NODE_IP:30080
      nodePort: 30080
      protocol: TCP
