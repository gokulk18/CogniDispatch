name: Build and Deploy AI Service

on:
  push:
    branches:
      - main
    paths:
      - 'services/ai-service/**'
      - 'services/shared/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'services/ai-service/package-lock.json'

      - name: Build dependencies
        run: |
          cd services/shared && npm install
          cd ../ai-service && npm install
        
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'cognidispatch-ai'
          publish-profile: ${{ secrets.AZURE_WEBAPP_AI_PUBLISH_PROFILE }}
          package: './services'
