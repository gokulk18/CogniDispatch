name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
        description: "Path to the service folder"
      image_name:
        required: true
        type: string
        description: "Name of the target Docker image in ACR"
      service_name:
        required: false
        type: string
        default: ""
        description: "Value of the SERVICE_NAME build argument (backend only)"
      dockerfile_path:
        required: true
        type: string
        description: "Path to the Dockerfile (relative to repo root)"
      docker_build_context:
        required: true
        type: string
        description: "Path to the build context (relative to repo root)"
      sonar_project_key:
        required: true
        type: string
        description: "SonarQube project key"
      helm_value_key:
        required: true
        type: string
        description: "The service key in values.yaml to update (e.g., adminService)"
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: false
      SNYK_TOKEN:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of SonarQube analysis

      # 1. SonarCloud Quality Analysis (without Quality Gate blocker)
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v3.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}
            -Dsonar.organization=gokulk18

      # 2. Dependency Vulnerability Scan (Snyk)
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          directory: ${{ inputs.working_directory }}
          args: --severity-threshold=high

      # 3. Set up QEMU & Docker Buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Azure Container Registry (ACR)
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: cogniregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 5. Bump version and push tag
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 6. Build Docker Image (Without Pushing yet, so Trivy can scan it)
      - name: Build Docker Image Locally
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker_build_context }}
          file: ${{ inputs.dockerfile_path }}
          load: true # Load the image into the local Docker daemon for Trivy scanning
          tags: cogniregistry.azurecr.io/${{ inputs.image_name }}:latest
          build-args: |
            NEXT_PUBLIC_SERVER_IP=https://cognidispatch.g0ku1.online
            SERVICE_NAME=${{ inputs.service_name }}

      # 7. Container Image Security Scan (Trivy)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cogniregistry.azurecr.io/${{ inputs.image_name }}:latest
          format: 'table'
          exit-code: '0' # Do not fail the build, just report issues
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 8. Push Docker Image to ACR
      - name: Push Docker Image to ACR
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker_build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            cogniregistry.azurecr.io/${{ inputs.image_name }}:${{ steps.tag_version.outputs.new_tag }}
            cogniregistry.azurecr.io/${{ inputs.image_name }}:latest
          build-args: |
            NEXT_PUBLIC_SERVER_IP=https://cognidispatch.g0ku1.online
            SERVICE_NAME=${{ inputs.service_name }}

      # 9. Update Helm values.yaml imageTag with the new version tag
      - name: Update Helm Values
        run: |
          node -e "
            const fs = require('fs');
            const yamlPath = 'helm/cognidispatch/values.yaml';
            const lines = fs.readFileSync(yamlPath, 'utf8').split(/\r?\n/);
            const serviceKey = '${{ inputs.helm_value_key }}';
            const newTag = '${{ steps.tag_version.outputs.new_tag }}';
            
            let inService = false;
            let updated = false;
            
            for (let i = 0; i < lines.length; i++) {
              const line = lines[i];
              if (line.startsWith(serviceKey + ':')) {
                inService = true;
                continue;
              }
              if (inService) {
                if (line.length > 0 && !line.startsWith(' ') && !line.startsWith('#')) {
                  inService = false;
                } else if (line.trim().startsWith('imageTag:')) {
                  lines[i] = '  imageTag: \"' + newTag + '\"';
                  updated = true;
                  break;
                }
              }
            }
            
            if (!updated && inService) {
              for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith(serviceKey + ':')) {
                  for (let j = i + 1; j < lines.length; j++) {
                    if (lines[j].length > 0 && !lines[j].startsWith(' ')) break;
                    if (lines[j].trim().startsWith('image:')) {
                      lines.splice(j + 1, 0, '  imageTag: \"' + newTag + '\"');
                      updated = true;
                      break;
                    }
                  }
                  if (updated) break;
                }
              }
            }
            
            if (updated) {
              fs.writeFileSync(yamlPath, lines.join('\n'), 'utf8');
              console.log('Updated values.yaml successfully for ' + serviceKey + ' with tag: ' + newTag);
            } else {
              console.log('Failed to update values.yaml - key not found or not updated');
              process.exit(1);
            }
          "

      # 10. Commit and push the updated values.yaml to the repository
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/cognidispatch/values.yaml
          git commit -m "ci: update ${{ inputs.helm_value_key }} image tag to ${{ steps.tag_version.outputs.new_tag }} [skip ci]"
          git push origin main
