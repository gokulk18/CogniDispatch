#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - nginx
  - curl

write_files:
  - path: /etc/nginx/sites-available/backend
    owner: root:root
    permissions: '0644'
    content: |
      server {
          listen 80;
          server_name _;

          location /api/health {
              add_header Content-Type application/json;
              return 200 '{"status":"online","service":"cognidispatch-backend"}';
          }

          location /api/auth/ {
              proxy_pass http://127.0.0.1:5001;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_connect_timeout 60s;
              proxy_read_timeout 60s;
          }

          location /api/vendors/ {
              proxy_pass http://127.0.0.1:5002;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_connect_timeout 60s;
              proxy_read_timeout 60s;
          }

          location /api/ai/ {
              proxy_pass http://127.0.0.1:5003;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_connect_timeout 120s;
              proxy_read_timeout 120s;
          }

          location /api/admin/ {
              proxy_pass http://127.0.0.1:5004;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_connect_timeout 60s;
              proxy_read_timeout 60s;
          }

          location /api/dispatches/ {
              proxy_pass http://127.0.0.1:5005;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_connect_timeout 300s;
              proxy_read_timeout 300s;
          }

          location /socket.io/ {
              proxy_pass http://127.0.0.1:5005;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_cache_bypass $http_upgrade;
              proxy_read_timeout 3600s;
              proxy_send_timeout 3600s;
          }
      }

  - path: /opt/setup-services.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e

      # Install Node.js 20
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      apt-get install -y nodejs

      # Install pm2 globally
      npm install -g pm2

      # Clone repository
      git clone ${git_repo_url} /opt/cognidispatch || true

      # Install shared dependencies if shared directory exists
      if [ -d "/opt/cognidispatch/services/shared" ]; then
        cd /opt/cognidispatch/services/shared && npm install
      fi

      # -----------------------------------------------------------------------
      # auth-service (port 5001)
      # -----------------------------------------------------------------------
      cd /opt/cognidispatch/services/auth-service
      npm install
      cat > .env <<'ENVEOF'
      PORT=5001
      MONGODB_URI=${mongodb_uri}
      AZURE_OPENAI_ENDPOINT=${azure_openai_endpoint}
      AZURE_OPENAI_KEY=${azure_openai_key}
      AZURE_OPENAI_DEPLOYMENT=${azure_openai_deployment}
      AZURE_SPEECH_REGION=${azure_speech_region}
      AZURE_SPEECH_KEY=${azure_speech_key}
      ENVEOF
      PORT=5001 pm2 start server.js --name auth-service --cwd /opt/cognidispatch/services/auth-service

      # -----------------------------------------------------------------------
      # vendor-service (port 5002)
      # -----------------------------------------------------------------------
      cd /opt/cognidispatch/services/vendor-service
      npm install
      cat > .env <<'ENVEOF'
      PORT=5002
      MONGODB_URI=${mongodb_uri}
      AZURE_OPENAI_ENDPOINT=${azure_openai_endpoint}
      AZURE_OPENAI_KEY=${azure_openai_key}
      AZURE_OPENAI_DEPLOYMENT=${azure_openai_deployment}
      AZURE_SPEECH_REGION=${azure_speech_region}
      AZURE_SPEECH_KEY=${azure_speech_key}
      ENVEOF
      PORT=5002 pm2 start server.js --name vendor-service --cwd /opt/cognidispatch/services/vendor-service

      # -----------------------------------------------------------------------
      # ai-service (port 5003)
      # -----------------------------------------------------------------------
      cd /opt/cognidispatch/services/ai-service
      npm install
      cat > .env <<'ENVEOF'
      PORT=5003
      MONGODB_URI=${mongodb_uri}
      AZURE_OPENAI_ENDPOINT=${azure_openai_endpoint}
      AZURE_OPENAI_KEY=${azure_openai_key}
      AZURE_OPENAI_DEPLOYMENT=${azure_openai_deployment}
      AZURE_SPEECH_REGION=${azure_speech_region}
      AZURE_SPEECH_KEY=${azure_speech_key}
      ENVEOF
      PORT=5003 pm2 start server.js --name ai-service --cwd /opt/cognidispatch/services/ai-service

      # -----------------------------------------------------------------------
      # admin-service (port 5004)
      # -----------------------------------------------------------------------
      cd /opt/cognidispatch/services/admin-service
      npm install
      cat > .env <<'ENVEOF'
      PORT=5004
      MONGODB_URI=${mongodb_uri}
      AZURE_OPENAI_ENDPOINT=${azure_openai_endpoint}
      AZURE_OPENAI_KEY=${azure_openai_key}
      AZURE_OPENAI_DEPLOYMENT=${azure_openai_deployment}
      AZURE_SPEECH_REGION=${azure_speech_region}
      AZURE_SPEECH_KEY=${azure_speech_key}
      ENVEOF
      PORT=5004 pm2 start server.js --name admin-service --cwd /opt/cognidispatch/services/admin-service

      # -----------------------------------------------------------------------
      # dispatch-service (port 5005)
      # -----------------------------------------------------------------------
      cd /opt/cognidispatch/services/dispatch-service
      npm install
      cat > .env <<'ENVEOF'
      PORT=5005
      MONGODB_URI=${mongodb_uri}
      AZURE_OPENAI_ENDPOINT=${azure_openai_endpoint}
      AZURE_OPENAI_KEY=${azure_openai_key}
      AZURE_OPENAI_DEPLOYMENT=${azure_openai_deployment}
      AZURE_SPEECH_REGION=${azure_speech_region}
      AZURE_SPEECH_KEY=${azure_speech_key}
      ENVEOF
      PORT=5005 pm2 start server.js --name dispatch-service --cwd /opt/cognidispatch/services/dispatch-service

      # Save pm2 process list and configure startup
      pm2 save
      env PATH=$PATH:/usr/bin /usr/lib/node_modules/pm2/bin/pm2 startup systemd -u root --hp /root | tail -1 | bash
      systemctl enable pm2-root || true

runcmd:
  - bash /opt/setup-services.sh >> /var/log/setup-services.log 2>&1
  - ln -sf /etc/nginx/sites-available/backend /etc/nginx/sites-enabled/backend
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t && systemctl enable nginx && systemctl restart nginx
